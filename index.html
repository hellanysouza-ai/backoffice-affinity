<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root {
  --purple:#6B2D6B; --purple-dark:#4e1f4e; --purple-light:#f3ebf3; --purple-pale:#faf5fa;
  --text:#1a1a1a; --muted:#6b6b6b; --border:#e4d8e4; --bg:#f2edf2; --card:#ffffff;
  --ok:#15803d; --ok-bg:#dcfce7; --danger:#b91c1c; --danger-bg:#fee2e2;
  --future-bg:#f3ebf3; --warn:#b45309; --warn-bg:#fef3c7;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
header{background:var(--purple);height:60px;padding:0 2rem;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:200;
  box-shadow:0 2px 16px rgba(107,45,107,.3)}
.h-logo{display:flex;align-items:center;gap:.6rem}
.h-logo-icon{width:34px;height:34px;background:rgba(255,255,255,.2);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:#fff}
.h-logo-text{font-size:1rem;font-weight:800;color:#fff}
.h-logo-text span{font-weight:400;opacity:.65;font-size:.78rem;margin-left:.25rem}
.h-chip{background:rgba(255,255,255,.15);color:#fff;font-size:.68rem;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;padding:.28rem .8rem;border-radius:999px}

/* GLOBAL BAR */
.global-bar{background:var(--card);border-bottom:1px solid var(--border);padding:.8rem 2rem;
  display:flex;align-items:center;gap:.85rem;flex-wrap:wrap;
  position:sticky;top:60px;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.global-bar label{font-size:.72rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--muted);white-space:nowrap}
.global-bar input[type="date"]{border:1.5px solid var(--border);border-radius:8px;
  padding:.42rem .8rem;font-size:.85rem;font-family:inherit;color:var(--text);
  outline:none;transition:border-color .15s}
.global-bar input[type="date"]:focus{border-color:var(--purple)}
.spacer{flex:1}

/* BUTTONS */
.btn{padding:.42rem 1.1rem;border-radius:8px;font-size:.8rem;font-weight:700;
  font-family:inherit;cursor:pointer;border:none;transition:filter .15s,transform .1s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-purple{background:var(--purple);color:#fff}
.btn-purple:hover{filter:brightness(1.12)}
.btn-outline{background:#fff;color:var(--purple);border:1.5px solid var(--border)}
.btn-outline:hover{border-color:var(--purple);background:var(--purple-pale)}

/* ATUALIZAR BASE */
.base-upload-btn{display:flex;align-items:center;gap:.4rem;background:var(--purple-light);
  color:var(--purple);border:1.5px solid var(--border);border-radius:8px;
  padding:.38rem .85rem;font-size:.78rem;font-weight:700;font-family:inherit;
  cursor:pointer;white-space:nowrap;transition:background .15s,border-color .15s}
.base-upload-btn:hover{background:#e8d5e8;border-color:var(--purple)}
.base-status{font-size:.68rem;color:var(--muted);white-space:nowrap}

/* PROCESSAR btn */
.btn-process{background:var(--purple);color:#fff;border-radius:8px;padding:.36rem .85rem;
  font-size:.74rem;font-weight:700;font-family:inherit;cursor:pointer;border:none;
  white-space:nowrap;transition:filter .15s,transform .1s;flex-shrink:0}
.btn-process:hover{filter:brightness(1.12)}
.btn-process:active{transform:scale(.97)}

/* MAIN */
main{max-width:1180px;margin:0 auto;padding:1.75rem 1.5rem 5rem}

/* SUMMARY */
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.85rem;margin-bottom:1.75rem}
.sc{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:1rem 1.2rem;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 12px 12px}
.sc.total::after{background:var(--purple)}
.sc.green::after{background:var(--ok)}
.sc.red::after{background:var(--danger)}
.sc-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;
  color:var(--muted);margin-bottom:.4rem}
.sc-value{font-size:1.45rem;font-weight:800;color:var(--text);line-height:1}
.sc-sub{font-size:.68rem;color:var(--muted);margin-top:.28rem}

/* TEAMS GRID */
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.1rem}

/* TEAM CARD */
.team-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 1px 6px rgba(107,45,107,.06);transition:box-shadow .2s}
.team-card:hover{box-shadow:0 4px 18px rgba(107,45,107,.13)}
.team-card.processed{border-color:#a7f3d0}

/* HEAD */
.tc-head{background:var(--purple);padding:.85rem 1rem;display:flex;
  align-items:center;justify-content:space-between;gap:.5rem}
.tc-head.done{background:var(--purple-dark)}
.tc-name{font-size:.8rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:#fff}
.tc-head-right{display:flex;align-items:center;gap:.5rem}
.tc-count{background:rgba(255,255,255,.18);color:#fff;font-size:.65rem;
  font-weight:700;padding:.15rem .5rem;border-radius:999px}
.rule-tag{background:rgba(255,255,255,.14);color:rgba(255,255,255,.85);font-size:.62rem;
  font-weight:600;padding:.15rem .45rem;border-radius:4px;white-space:nowrap}
.processed-tick{display:none;align-items:center;gap:.3rem;font-size:.7rem;
  font-weight:700;color:#6ee7b7;white-space:nowrap}
.team-card.processed .processed-tick{display:flex}

/* UPLOAD STRIP */
.tc-upload-strip{background:var(--purple-pale);border-bottom:1px solid var(--border);
  padding:.5rem 1rem;display:flex;align-items:center;gap:.6rem;
  position:relative;cursor:pointer;transition:background .15s}
.tc-upload-strip:hover{background:var(--purple-light)}
.tc-upload-strip.loaded{background:#f0fdf4;border-bottom-color:#bbf7d0}
.tc-upload-strip input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}
.tc-upload-icon{color:var(--purple);flex-shrink:0}
.tc-upload-strip.loaded .tc-upload-icon{color:var(--ok)}
.tc-upload-name{font-size:.73rem;font-weight:600;color:var(--purple);flex:1;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tc-upload-strip.loaded .tc-upload-name{color:var(--ok)}
.tc-upload-hint{font-size:.67rem;color:var(--muted);flex-shrink:0}

/* ACTION ROW */
.tc-action-row{display:none;background:#fffbeb;border-bottom:1px solid #fde68a;
  padding:.42rem 1rem;align-items:center;justify-content:space-between;gap:.5rem}
.tc-action-row.visible{display:flex}
.tc-action-label{font-size:.72rem;font-weight:600;color:var(--warn);flex:1;min-width:0}

/* MEMBERS */
.tc-members{flex:1}
.tc-member{display:flex;align-items:center;justify-content:space-between;
  padding:.55rem 1rem;border-bottom:1px solid #f5f0f5;gap:.5rem;transition:background .1s}
.tc-member:last-child{border-bottom:none}
.tc-member:hover{background:var(--purple-pale)}
.tc-member-info{flex:1;min-width:0}
.tc-member-name{font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tc-member-code{font-size:.68rem;color:var(--muted)}
.tc-member-obs{font-size:.65rem;color:var(--muted);margin-top:.06rem;font-style:italic}
.tc-member-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.tc-member-value{font-size:.8rem;font-weight:700;color:var(--purple);white-space:nowrap}
.tc-member-value.muted{color:#c4b5c4;font-weight:400;text-decoration:line-through}

/* FOOTER */
.tc-footer{background:var(--purple-pale);border-top:1px solid var(--border);
  padding:.6rem 1rem;display:flex;align-items:center;justify-content:space-between}
.tc-footer-label{font-size:.68rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--muted)}
.tc-footer-total{font-size:.95rem;font-weight:800;color:var(--purple)}
.tc-footer-total.done{color:var(--ok)}

/* BADGES */
.badge{display:inline-block;padding:.18rem .55rem;border-radius:999px;
  font-size:.62rem;font-weight:700;white-space:nowrap}
.badge-ok{background:var(--ok-bg);color:var(--ok)}
.badge-ended{background:var(--danger-bg);color:var(--danger)}
.badge-future{background:var(--future-bg);color:var(--purple)}

/* ALERT */
.alert{padding:.65rem 1rem;border-radius:8px;font-size:.8rem;margin-bottom:1rem;border:1px solid}
.alert-info{background:var(--purple-light);color:var(--purple-dark);border-color:#d4b0d4}
.alert-warn{background:#fffbeb;color:#92400e;border-color:#fde68a}

/* MODO EDIÇÃO */
.tc-edit-bar{display:none;background:var(--purple-pale);border-bottom:1px solid var(--border);
  padding:.45rem 1rem;align-items:center;justify-content:space-between;gap:.5rem}
.tc-edit-bar.visible{display:flex}
.btn-edit{background:transparent;border:1.5px solid rgba(255,255,255,.35);border-radius:6px;
  color:rgba(255,255,255,.85);font-size:.68rem;font-weight:700;font-family:inherit;
  padding:.2rem .6rem;cursor:pointer;transition:background .15s}
.btn-edit:hover{background:rgba(255,255,255,.15)}

.edit-table{width:100%;border-collapse:collapse;font-size:.78rem}
.edit-table thead th{background:#f0e8f0;padding:.45rem .75rem;text-align:left;
  font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  color:var(--purple);border-bottom:1px solid var(--border)}
.edit-table tbody tr{border-bottom:1px solid #f0eaf0}
.edit-table tbody tr:last-child{border-bottom:none}
.edit-table tbody td{padding:.35rem .5rem;vertical-align:middle}
.edit-input{border:1.5px solid var(--border);border-radius:6px;padding:.28rem .5rem;
  font-size:.76rem;font-family:inherit;color:var(--text);width:100%;outline:none;
  transition:border-color .15s;background:#fff}
.edit-input:focus{border-color:var(--purple)}
.btn-del-row{background:none;border:none;cursor:pointer;color:#ccc;font-size:1rem;
  padding:.1rem .3rem;line-height:1;transition:color .15s;flex-shrink:0}
.btn-del-row:hover{color:var(--danger)}
.edit-actions{display:flex;align-items:center;gap:.5rem;padding:.55rem 1rem;
  background:#faf5fa;border-top:1px solid var(--border)}
.btn-add-row{display:flex;align-items:center;gap:.35rem;background:none;border:none;
  color:var(--purple);font-size:.75rem;font-weight:700;font-family:inherit;cursor:pointer;padding:0}
.btn-add-row:hover{opacity:.75}
.btn-save-edit{background:var(--purple);color:#fff;border:none;border-radius:7px;
  padding:.35rem .9rem;font-size:.75rem;font-weight:700;font-family:inherit;cursor:pointer}
.btn-save-edit:hover{filter:brightness(1.1)}
.btn-cancel-edit{background:none;border:1.5px solid var(--border);border-radius:7px;
  padding:.33rem .8rem;font-size:.75rem;font-weight:700;font-family:inherit;
  color:var(--muted);cursor:pointer}
.btn-cancel-edit:hover{border-color:var(--muted)}

/* Highlight ao atualizar */
@keyframes cardHighlight {
  0%   { box-shadow: 0 0 0 3px #6B2D6B; }
  50%  { box-shadow: 0 0 0 6px rgba(107,45,107,0.3); }
  100% { box-shadow: 0 1px 6px rgba(107,45,107,.06); }
}
.team-card.updating { animation: cardHighlight 0.7s ease-out; }

@media(max-width:700px){
  .summary-row{grid-template-columns:1fr 1fr}
  .teams-grid{grid-template-columns:1fr}
  .global-bar{padding:.75rem 1rem}
}
@media print{
  header,.global-bar,.tc-upload-strip,.tc-action-row{display:none !important}
  .team-card{break-inside:avoid;box-shadow:none;border:1px solid #ccc}
}
</style>

<header>
  <div class="h-logo">
    <div class="h-logo-icon">✦</div>
    <div class="h-logo-text">Affinity <span>corretora</span></div>
  </div>

</header>

<div class="global-bar">
  <label for="reportDate">Data de assinatura</label>

  <button class="btn btn-purple" onclick="apurarTodos()">▶ Apurar todos</button>
  <div class="spacer"></div>
  <button class="base-upload-btn" onclick="document.getElementById('baseFileInput').click()">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/>
      <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
    </svg>
    Atualizar base de backs
  </button>
  <input type="file" id="baseFileInput" accept=".xlsx,.xls" style="display:none" onchange="atualizarBase(event)" />
  <span class="base-status" id="baseStatus"></span>
  <button class="btn btn-outline" onclick="window.print()">Imprimir</button>
</div>

<main>
  <div id="alertBox" style="display:none"></div>

  <div class="summary-row" id="summaryRow" style="display:none">
    <div class="sc total">
      <div class="sc-label">Total a pagar</div>
      <div class="sc-value" id="sc-total">—</div>
      <div class="sc-sub">soma de todas as equipes processadas</div>
    </div>

    </div>
    <div class="sc red">

      <div class="sc-value" id="sc-inativo">—</div>
      <div class="sc-sub">fora do período</div>
    </div>
  </div>

  <div class="teams-grid" id="teamsGrid"></div>
</main>

// ── STATE ────────────────────────────────────────────────────────────────────
var teamState = {};
function initState() {
  BASE_TEAMS.forEach(function(t) {
    teamState[t.id] = { liquido: null, totalCard: null, fileName: null, processed: false };
  });
}

// ── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {

function renderGrid() {
  var grid = document.getElementById('teamsGrid');
  grid.innerHTML = '';
  BASE_TEAMS.forEach(function(team) { grid.appendChild(buildCard(team)); });
}

// ── BUILD CARD ───────────────────────────────────────────────────────────────
function buildCard(team) {
  var wrap = document.createElement('div');
  wrap.className = 'team-card';
  wrap.id = 'card-' + team.id;
  wrap.innerHTML =
    '<div class="tc-head" id="head-' + team.id + '">' +
      '<div class="tc-name">' + team.name + '</div>' +
      '<div class="tc-head-right">' +
        (team.rule ? '<span class="rule-tag">' + team.rule + '</span>' : '') +
        '<span class="tc-count" id="count-' + team.id + '">' + team.members.length + ' pessoas</span>' +
        '<button class="btn-edit" onclick="abrirEdicao(\'' + team.id + '\')">✎ Editar</button>' +
        '<span class="processed-tick">✓ Processado</span>' +
      '</div>' +
    '</div>' +

    '<div class="tc-upload-strip" id="strip-' + team.id + '">' +
      '<input type="file" accept=".xls,.xlsx" onchange="onFileSelected(event,\'' + team.id + '\')" onclick="event.stopPropagation()" />' +
      '<svg class="tc-upload-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">' +
        '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>' +
        '<polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>' +
      '</svg>' +
      '<span class="tc-upload-name" id="fname-' + team.id + '">Carregar relatório desta equipe</span>' +
      '<span class="tc-upload-hint">Sem arquivo</span>' +
    '</div>' +

    '<div class="tc-action-row" id="action-' + team.id + '">' +
      '<span class="tc-action-label" id="action-label-' + team.id + '"></span>' +
      '<button class="btn-process" onclick="processarCard(\'' + team.id + '\')">Processar</button>' +
    '</div>' +

    /* PAINEL DE EDIÇÃO — oculto por padrão */
    '<div id="edit-panel-' + team.id + '" style="display:none">' +
      '<div class="edit-table-wrap" style="overflow-x:auto">' +
        '<table class="edit-table">' +
          '<thead><tr>' +
            '<th>Cód. Sis</th><th>Nome</th><th>Observação</th><th style="width:28px"></th>' +
          '</tr></thead>' +
          '<tbody id="edit-tbody-' + team.id + '"></tbody>' +
        '</table>' +
      '</div>' +
      '<div class="edit-actions">' +
        '<button class="btn-add-row" onclick="addEditRow(\'' + team.id + '\')">' +
          '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>' +
          ' Adicionar pessoa' +
        '</button>' +
        '<div style="flex:1"></div>' +
        '<button class="btn-cancel-edit" onclick="fecharEdicao(\'' + team.id + '\')">Cancelar</button>' +
        '<button class="btn-save-edit" onclick="salvarEdicao(\'' + team.id + '\')">✓ Salvar</button>' +
      '</div>' +
    '</div>' +

    '<div class="tc-members" id="members-' + team.id + '">' +
      team.members.map(function(m) { return memberRow(team.id, m); }).join('') +
    '</div>' +

    '<div class="tc-footer">' +
      '<span class="tc-footer-label">Total apurado</span>' +
      '<span class="tc-footer-total" id="footer-total-' + team.id + '">—</span>' +
    '</div>';
  return wrap;
}

function memberRow(teamId, m) {
  return '<div class="tc-member" id="row-' + teamId + '-' + m.code + '">' +
    '<div class="tc-member-info">' +
      '<div class="tc-member-name">' + m.name + '</div>' +
      '<div class="tc-member-code">' + m.code + '</div>' +
      (m.obs ? '<div class="tc-member-obs">' + m.obs + '</div>' : '') +
    '</div>' +
    '<div class="tc-member-right">' +
      '<span class="badge badge-ok" id="badge-' + teamId + '-' + m.code + '">Ativo</span>' +
      '<span class="tc-member-value" id="val-' + teamId + '-' + m.code + '">—</span>' +
    '</div>' +
  '</div>';
}

// ── EDIÇÃO INLINE ────────────────────────────────────────────────────────────
function abrirEdicao(teamId) {
  var team  = BASE_TEAMS.filter(function(t) { return t.id === teamId; })[0];
  var tbody = document.getElementById('edit-tbody-' + teamId);
  tbody.innerHTML = '';

  team.members.forEach(function(m, idx) {
    tbody.appendChild(makeEditRow(teamId, m.code, m.name, m.obs || '', idx));
  });

  // Esconde lista normal, mostra painel
  document.getElementById('members-' + teamId).style.display  = 'none';
  document.getElementById('edit-panel-' + teamId).style.display = 'block';
  document.getElementById('strip-' + teamId).style.display    = 'none';
  document.getElementById('action-' + teamId).style.display   = 'none';
}

function fecharEdicao(teamId) {
  document.getElementById('edit-panel-' + teamId).style.display  = 'none';
  document.getElementById('members-' + teamId).style.display     = '';
  document.getElementById('strip-' + teamId).style.display       = '';
  var actionRow = document.getElementById('action-' + teamId);
  if (actionRow) actionRow.style.display = '';
}

function makeEditRow(teamId, code, name, obs, idx) {
  var tr = document.createElement('tr');
  tr.id  = 'erow-' + teamId + '-' + idx;
  tr.innerHTML =
    '<td><input class="edit-input" style="width:80px" value="' + esc(code) + '" placeholder="Código" data-field="code" /></td>' +
    '<td><input class="edit-input" value="' + esc(name) + '" placeholder="Nome completo" data-field="name" /></td>' +
    '<td><input class="edit-input" value="' + esc(obs)  + '" placeholder='  + '"Recebe até dd/mm/aaaa" data-field="obs" /></td>' +
    '<td><button class="btn-del-row" onclick="delEditRow(this)" title="Remover">✕</button></td>';
  return tr;
}

function addEditRow(teamId) {
  var tbody = document.getElementById('edit-tbody-' + teamId);
  var idx   = tbody.rows.length;
  tbody.appendChild(makeEditRow(teamId, '', '', '', idx));
  // Foca no campo código da nova linha
  tbody.rows[tbody.rows.length - 1].querySelector('input').focus();
}

function delEditRow(btn) {
  btn.closest('tr').remove();
}

function salvarEdicao(teamId) {
  var team  = BASE_TEAMS.filter(function(t) { return t.id === teamId; })[0];
  var tbody = document.getElementById('edit-tbody-' + teamId);
  var rows  = tbody.querySelectorAll('tr');
  var newMembers = [];

  for (var i = 0; i < rows.length; i++) {
    var inputs = rows[i].querySelectorAll('input');
    var code   = inputs[0].value.trim();
    var name   = inputs[1].value.trim();
    var obs    = inputs[2].value.trim();
    if (!code && !name) continue; // linha vazia, ignora
    var start  = extractDateObs(obs, 'start');
    var end    = extractDateObs(obs, 'end');
    newMembers.push({ code: code, name: name, obs: obs, start: start, end: end });
  }

  if (newMembers.length === 0) {
    alert('A equipe precisa ter pelo menos uma pessoa.');
    return;
  }

  // Atualiza BASE_TEAMS
  team.members = newMembers;

  // Reseta estado processado
  teamState[teamId].processed = false;
  teamState[teamId].totalCard = null;

  // Fecha edição
  fecharEdicao(teamId);

  // Reconstrói lista de membros
  var membersDiv = document.getElementById('members-' + teamId);
  membersDiv.innerHTML = newMembers.map(function(m) { return memberRow(teamId, m); }).join('');

  // Atualiza contador
  var countEl = document.getElementById('count-' + teamId);
  if (countEl) countEl.textContent = newMembers.length + ' pessoas';

  // Remove estado processado do card
  document.getElementById('card-' + teamId).classList.remove('processed');
  var ftEl = document.getElementById('footer-total-' + teamId);
  ftEl.className   = 'tc-footer-total';
  ftEl.textContent = '—';

  // Pulsa card para confirmar
  var card = document.getElementById('card-' + teamId);
  card.classList.add('updating');
  setTimeout(function() { card.classList.remove('updating'); }, 700);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}


function onFileSelected(event, teamId) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb   = XLSX.read(e.target.result, { type:'array', cellDates:true });
      var ws   = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(ws, { header:1, raw:true, defval:null });

      // Busca linha "Total de Comissionamento das Operadoras:" → coluna 35 = Líquido
      var liquido = null;
      for (var i = 0; i < rows.length; i++) {
        var row = rows[i];
        var c1  = String(row[1] || '').trim();
        if (/Total de Comissionamento das Operadoras/i.test(c1)) {
          var v = parseFloat(String(row[35] || '').replace(',', '.'));
          if (!isNaN(v)) { liquido = v; break; }
          // fallback: última coluna numérica da mesma linha
          for (var j = row.length - 1; j >= 0; j--) {
            var vf = parseFloat(String(row[j] || '').replace(',', '.'));
            if (!isNaN(vf) && vf > 0) { liquido = vf; break; }
          }
          break;
        }
      }

      teamState[teamId].liquido    = liquido;
      teamState[teamId].fileName   = file.name;
      teamState[teamId].processed  = false;
      teamState[teamId].totalCard  = null;

      // Upload strip
      var strip = document.getElementById('strip-' + teamId);
      strip.classList.add('loaded');
      document.getElementById('fname-' + teamId).textContent = '📄 ' + file.name;

      // Action row
      var lbl = liquido !== null
        ? 'Líquido encontrado: ' + fmtBRL(liquido) + ' — clique em Processar'
        : '⚠️ Valor líquido não encontrado — verifique o arquivo';
      document.getElementById('action-label-' + teamId).textContent = lbl;
      document.getElementById('action-' + teamId).classList.add('visible');

      // Reset processed
      document.getElementById('card-' + teamId).classList.remove('processed');
      var ftEl = document.getElementById('footer-total-' + teamId);
      ftEl.className = 'tc-footer-total';
      ftEl.textContent = '—';

    } catch(err) {
      showAlert('warn', 'Erro ao ler arquivo da equipe ' + teamId + ': ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── PROCESSAR CARD ───────────────────────────────────────────────────────────
// Regra: cada membro ELEGÍVEL recebe o valor líquido TOTAL do relatório (não dividido).
// Total do card = liquido × nº de elegíveis.
function processarCard(teamId) {
  var dateInput = document.getElementById('reportDate').value;
  if (!dateInput) { showAlert('warn', '⚠️ Informe a data de assinatura antes de processar.'); return; }

  var ref   = dateOnly(new Date(dateInput + 'T00:00:00'));
  var team  = BASE_TEAMS.filter(function(t) { return t.id === teamId; })[0];
  var state = teamState[teamId];

  if (state.liquido === null) {
    showAlert('warn', 'Nenhum valor líquido encontrado no arquivo da equipe ' + team.name + '.');
    return;
  }

  var totalCard = 0;

  team.members.forEach(function(m) {
    var status = getStatus(m, ref);
    var isOk   = status.code === 'ok';
    var badgeEl = document.getElementById('badge-' + teamId + '-' + m.code);
    var valEl   = document.getElementById('val-' + teamId + '-' + m.code);

    if (badgeEl) { badgeEl.className = 'badge ' + badgeClass(status.code); badgeEl.textContent = status.label; }
    if (valEl) {
      valEl.textContent = fmtBRL(state.liquido);
      if (isOk) {
        valEl.className = 'tc-member-value';
      } else {
        valEl.className = 'tc-member-value muted';
      }
    }
  });

  // Total apurado = valor líquido do relatório (independente do nº de elegíveis)
  totalCard = state.liquido;
  state.totalCard  = totalCard;
  state.processed  = true;

  var ftEl = document.getElementById('footer-total-' + teamId);
  ftEl.className   = 'tc-footer-total done';
  ftEl.textContent = fmtBRL(totalCard);

  document.getElementById('card-' + teamId).classList.add('processed');
  document.getElementById('action-' + teamId).classList.remove('visible');

  updateSummary();
}

// ── APURAR TODOS ─────────────────────────────────────────────────────────────
function apurarTodos() {
  var dateInput = document.getElementById('reportDate').value;
  if (!dateInput) { showAlert('warn', '⚠️ Informe a data de assinatura do relatório.'); return; }

  var processados = 0;
  BASE_TEAMS.forEach(function(team) {
    var st = teamState[team.id];
    if (st.liquido !== null && !st.processed) { processarCard(team.id); processados++; }
    else if (st.processed) processados++;
  });

  updateSummary();
  var fmt = new Date(dateInput + 'T00:00:00').toLocaleDateString('pt-BR');
  showAlert('info', '✅ Apuração em <strong>' + fmt + '</strong> — ' + processados + ' equipe(s) processadas.');
}

// ── SUMMARY ──────────────────────────────────────────────────────────────────
function updateSummary() {
  var dateInput = document.getElementById('reportDate').value;
  if (!dateInput) return;
  var ref = dateOnly(new Date(dateInput + 'T00:00:00'));

  var grand = 0, ativos = 0, inativo = 0;
  BASE_TEAMS.forEach(function(team) {
    var st = teamState[team.id];
    if (!st.processed) return;
    grand += st.totalCard || 0;
    team.members.forEach(function(m) {
      if (getStatus(m, ref).code === 'ok') ativos++;
      else inativo++;
    });
  });

  document.getElementById('sc-total').textContent   = fmtBRL(grand);
  document.getElementById('sc-ativos').textContent  = ativos;
  document.getElementById('sc-inativo').textContent = inativo;
  document.getElementById('summaryRow').style.display = 'grid';
}

// ── ATUALIZAR BASE DE BACKS ──────────────────────────────────────────────────
// Layout real da planilha BACKOFFICE:
//   Nome da equipe : col[1] sozinho na linha
//   Membro         : col[2] = "NOME (código)" ou "código - NOME", col[1] = obs, col[6] = nome display
//   Regra          : col[2] sem padrão de código (1%, lançar, etc.)
function atualizarBase(event) {
  var file = event.target.files[0];
  if (!file) return;

  var btn = document.querySelector('.base-upload-btn');
  btn.textContent = '⏳ Lendo...';

  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb   = XLSX.read(e.target.result, { type:'array' });
      var ws   = wb.Sheets[wb.SheetNames[0]];
      var raw  = XLSX.utils.sheet_to_json(ws, { header:1, raw:false, defval:'' });

      var newTeams = [];
      var current  = null;

      for (var i = 0; i < raw.length; i++) {
        // Normaliza: array de strings limpas, sem nulls
        var row = raw[i].map(function(v) { return String(v == null ? '' : v).trim(); });

        // Pula linhas totalmente vazias
        var nonEmpty = row.filter(function(v) { return v !== ''; });
        if (nonEmpty.length === 0) continue;

        // Pula cabeçalhos globais
        var rowStr = nonEmpty.join(' ');
        if (/relat[oó]rio backoffice|regra de distribui/i.test(rowStr)) continue;

        // Detecta se alguma célula tem padrão de membro: "NOME (12345)" ou "12345 - NOME"
        var memberCell = '';
        var obsCell    = '';
        for (var c = 0; c < row.length; c++) {
          var cell = row[c];
          if (/\(\d{4,7}\)/.test(cell) || /^\d{4,7}\s*[-\u2013]/.test(cell)) {
            memberCell = cell;
            // A observação está na célula anterior não-vazia
            for (var prev = c - 1; prev >= 0; prev--) {
              if (row[prev] !== '') { obsCell = row[prev]; break; }
            }
            break;
          }
        }

        if (memberCell) {
          if (!current) continue;
          var parsed  = parseCodeName(memberCell);
          // Nome display: busca célula que seja texto puro (sem dígitos longos, sem keywords)
          // Prioriza células que parecem nomes: só letras/espaços, tamanho razoável
          var display = parsed.name;
          var bestScore = -1;
          for (var nc = 0; nc < row.length; nc++) {
            var cv = row[nc];
            if (!cv || cv === memberCell || cv === obsCell) continue;
            if (/\d{4,7}/.test(cv)) continue;           // tem código numérico longo
            if (/\(\d/.test(cv)) continue;              // tem código entre parênteses
            if (/recebe|a partir|at[eé]|%|lan[cç]ar|colegiada|valor cheio/i.test(cv)) continue;
            if (/^\d+([.,]\d+)?$/.test(cv)) continue;   // é só número (valor)
            if (cv.length < 2 || cv.length > 50) continue;
            // Pontua: prefere células com letras, sem números
            var score = /^[A-Za-zÀ-ÖØ-öø-ÿ\s]+$/.test(cv) ? 2 : 1;
            if (score > bestScore) { bestScore = score; display = cv; }
          }
          var isRealObs = /recebe|a partir|at[eé]\s+\d/i.test(obsCell);
          var finalObs  = isRealObs ? obsCell : '';
          var start = extractDateObs(finalObs, 'start');
          var end   = extractDateObs(finalObs, 'end');
          current.members.push({ code: parsed.code, name: display, obs: finalObs, start: start, end: end });
          continue;
        }

        // Detecta regra (1%, lançar, colegiada, valor cheio) — sem código de membro
        var isRule = /1[%,]|lan[cç]ar|colegiada|valor cheio/i.test(rowStr)
                  && !/\d{4,7}/.test(rowStr);
        if (isRule) {
          if (current && !current.rule) {
            current.rule = nonEmpty.join(' ').replace(/\s+/g,' ').trim();
          }
          continue;
        }

        // Detecta nome de equipe: linha com apenas 1 célula não-vazia, sem código, sem obs-keywords
        var isTeam = nonEmpty.length === 1
          && !(/\d{4,7}/.test(nonEmpty[0]))
          && !(/recebe|a partir|at[eé]|%|lan[cç]ar|colegiada|valor cheio/i.test(nonEmpty[0]))
          && nonEmpty[0].length >= 2 && nonEmpty[0].length < 60;

        if (isTeam) {
          var tname = nonEmpty[0];
          var tid   = tname.toUpperCase().replace(/\s+/g,'-').replace(/[^A-Z0-9\-]/g,'');
          current = { id: tid, name: tname, rule: '', members: [] };
          newTeams.push(current);
          continue;
        }
      }

      var valid = newTeams.filter(function(t) { return t.members.length > 0; });

      if (valid.length === 0) {
        document.getElementById('baseStatus').textContent = '⚠️ Nenhuma equipe encontrada';
        btn.innerHTML = '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg> Atualizar base de backs';
        showAlert('warn', '⚠️ Nenhuma equipe encontrada no arquivo. Verifique o formato.');
        return;
      }

      // Atualiza BASE_TEAMS: merge por id ou name
      valid.forEach(function(newT) {
        var idx = -1;
        for (var k = 0; k < BASE_TEAMS.length; k++) {
          if (BASE_TEAMS[k].id === newT.id || BASE_TEAMS[k].name.toLowerCase() === newT.name.toLowerCase()) {
            idx = k; break;
          }
        }
        if (idx >= 0) {
          BASE_TEAMS[idx].members = newT.members;
          if (newT.rule) BASE_TEAMS[idx].rule = newT.rule;
        } else {
          BASE_TEAMS.push(newT);
          teamState[newT.id] = { liquido:null, totalCard:null, fileName:null, processed:false };
        }
      });

      // Reconstrói grid completo
      var grid = document.getElementById('teamsGrid');
      grid.innerHTML = '';
      BASE_TEAMS.forEach(function(team) {
        if (!teamState[team.id]) teamState[team.id] = { liquido:null, totalCard:null, fileName:null, processed:false };
        teamState[team.id].processed = false;
        teamState[team.id].totalCard = null;
        grid.appendChild(buildCard(team));
      });

      // Pulsa cards
      setTimeout(function() {
        document.querySelectorAll('.team-card').forEach(function(c) {
          c.classList.add('updating');
          setTimeout(function() { c.classList.remove('updating'); }, 700);
        });
      }, 50);

      document.getElementById('summaryRow').style.display = 'none';
      document.getElementById('baseStatus').textContent = '✓ ' + valid.length + ' equipes atualizadas';
      btn.innerHTML = '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg> Atualizar base de backs';
      showAlert('info', '✅ Base atualizada com <strong>' + file.name + '</strong> — ' + valid.length + ' equipes. Carregue os relatórios de cada equipe.');

    } catch(err) {
      document.getElementById('baseStatus').textContent = '⚠️ Erro';
      btn.innerHTML = '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg> Atualizar base de backs';
      showAlert('warn', 'Erro ao atualizar base: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseCodeName(s) {
  // "NOME (12345)" ou "12345 - NOME"
  var m = s.match(/\((\d{4,7})\)/);
  if (m) {
    return { code: m[1], name: s.replace(/\s*\(\d+\)\s*/g,'').trim() };
  }
  m = s.match(/^(\d{4,7})\s*[-\u2013]\s*(.+)/);
  if (m) return { code: m[1].trim(), name: m[2].trim() };
  return { code: '', name: s.trim() };
}

function extractDateObs(obs, type) {
  if (!obs) return null;
  var re = type === 'end'
    ? /at[eé]\s+(\d{2}\/\d{2}\/\d{2,4})/i
    : /a partir de\s+(\d{2}\/\d{2}\/\d{2,4})/i;
  var m = obs.match(re);
  return m ? m[1] : null;
}

// ── STATUS ───────────────────────────────────────────────────────────────────
function getStatus(m, ref) {
  var end   = m.end   ? parseBRDate(m.end)   : null;
  var start = m.start ? parseBRDate(m.start) : null;
  if (!start && !end)                        return { code:'ok',     label:'Ativo' };
  if (end   && dateOnly(end)   < ref)        return { code:'ended',  label:'Encerrado' };
  if (start && dateOnly(start) > ref)        return { code:'future', label:'Não iniciado' };
  return { code:'ok', label:'Ativo' };
}
function badgeClass(code) {
  return { ok:'badge-ok', ended:'badge-ended', future:'badge-future' }[code] || 'badge-ok';
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function parseBRDate(s) {
  if (!s) return null;
  var p = s.split('/');
  if (p.length < 3) return null;
  var y = p[2].length === 2 ? '20'+p[2] : p[2];
  return new Date(y + '-' + p[1].padStart(2,'0') + '-' + p[0].padStart(2,'0'));
}
function dateOnly(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function fmtBRL(v) {
  if (v === null || v === undefined) return '—';
  return v.toLocaleString('pt-BR', { style:'currency', currency:'BRL' });
}
function showAlert(type, html) {
  var box = document.getElementById('alertBox');
  box.className = 'alert alert-' + type;
  box.innerHTML = html;
  box.style.display = 'block';
}
</script>
